{% extends 'template.html' %}

{% block titulo %}Cadastro{% endblock %}

{% block conteudo %}

<h1>Criar Conta</h1>

<br>

<form action="{% url 'cadastro' %}" method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <input type="submit" value="Cadastrar">
</form>

<br>
<p style="display:inline; background:none; border:none; padding:0;">
    Já tem conta? <a href="{% url 'login' %}">Entrar</a>
</p>

{% endblock %}
